[network]
gateway_port = 3000
gateway_addr = "0.0.0.0:3000"
spine_grpc_port = 50051
spine_grpc_addr = "http://127.0.0.1:50051"
redis_socket = "koad.sock"
spine_socket = "kspine.sock"

[storage]
db_name = "koad.db"

[sessions]
deadman_timeout_secs = 45
dark_timeout_secs = 60
purge_timeout_secs = 300
lease_duration_secs = 90

[watchdog]
check_interval_secs = 10
max_failures = 3
monitor_asm = true
