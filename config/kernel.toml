[system]
version = "3.2"

[network]
gateway_port = 3000
gateway_addr = "0.0.0.0:3000"
citadel_grpc_port = 50051
citadel_grpc_addr = "http://127.0.0.1:50051"
cass_grpc_port = 50052
cass_grpc_addr = "http://127.0.0.1:50052"
redis_socket = "koad.sock"
citadel_socket = "kcitadel.sock"

[storage]
db_name = "koad.db"
drain_interval_secs = 30

[sessions]
deadman_timeout_secs = 45
dark_timeout_secs = 60
purge_timeout_secs = 300
lease_duration_secs = 90
reaper_interval_secs = 10

[watchdog]
check_interval_secs = 10
max_failures = 3
monitor_asm = true

[filesystem]
workspace_root = "/home/ideans"
protected_paths = ["~/.ssh", "~/.notion"]
allowed_directories = [
  "~/.koad-os",
  "~/projects"
]

[sandbox]
enabled = true
blacklist = ["sudo ", "su ", "rm -rf /", "koad boot"]
sanctuary = [".koad-os", "/etc", "/var", "/root"]
