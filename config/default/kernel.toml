[citadel]
host = "127.0.0.1"
port = 50051
uds_path = "/tmp/koad.citadel.sock"

[redis]
url = "redis://127.0.0.1:6379"
stream_prefix = "koad:stream:"

[sqlite]
db_path = "~/.koad-os/data/db/koad.db"
wal_mode = true

[signal_corps]
broadcast_interval_ms = 500
retention_count = 1000

[memory_insurance]
backup_interval_hours = 4
snapshot_retention = 10

[security]
zero_trust = true
strict_path_validation = true