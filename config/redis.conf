# KoadOS v3 Redis Configuration
# Optimized for local-only gRPC/UDS communication

# Network
port 0
unixsocket /home/ideans/.koad-os/run/koad.sock
unixsocketperm 700
bind 127.0.0.1
protected-mode yes

# General
daemonize no
pidfile /home/ideans/.koad-os/run/redis.pid
logfile /home/ideans/.koad-os/logs/redis.log

# Persistence (Tuned for Hybrid State)
# We use Write-Behind to SQLite, but keep a minimal RDB for emergency recovery
save 900 1
save 300 10
save 60 10000
dbfilename koad_state.rdb
dir /home/ideans/.koad-os/data/redis

# Performance Tuning
maxmemory 256mb
maxmemory-policy allkeys-lru
appendonly no
