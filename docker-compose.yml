version: '3.8'

services:
  citadel-redis:
    image: redis/redis-stack:latest
    container_name: koad-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-koados_secret}
    restart: unless-stopped

volumes:
  redis_data:
