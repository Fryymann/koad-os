version: '3.8'

services:
  citadel-redis:
    image: redis/redis-stack:7.2.0-v10 # Pinned version
    container_name: koad-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.0 # Pinned version
    container_name: koad-qdrant
    ports:
      - "6333:6333" # HTTP / REST + Web UI
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  cass:
    build:
      context: .
      dockerfile: Dockerfile.citadel
    container_name: koad-cass
    depends_on:
      - citadel-redis
      - qdrant
    ports:
      - "50051:50051"
    environment:
      - KOADOS_URL_REDIS=redis://citadel-redis:6379
      - KOADOS_URL_QDRANT=http://qdrant:6333
    volumes:
      - cass_data:/app/data
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  cass_data:
