version: '3.8'

services:
  citadel-redis:
    image: redis/redis-stack:latest
    container_name: koad-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: koad-qdrant
    ports:
      - "6333:6333" # HTTP / REST + Web UI
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
