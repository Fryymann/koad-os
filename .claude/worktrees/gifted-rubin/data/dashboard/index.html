<!DOCTYPE html>
<html>
<head>
    <title>KoadOS v3 - Command Deck</title>
    <style>
        :root { --neon-green: #00ff00; --deep-space: #050505; --panel-bg: #0a0a0a; --accent-blue: #00ffff; }
        body { font-family: 'Courier New', monospace; background: var(--deep-space); color: var(--neon-green); padding: 2rem; margin: 0; }
        .deck-grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 1.5rem; height: 90vh; }
        .panel { border: 1px solid var(--neon-green); padding: 1.2rem; background: var(--panel-bg); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        h1 { margin: 0 0 1.5rem 0; border-bottom: 2px solid var(--neon-green); padding-bottom: 0.5rem; letter-spacing: 2px; }
        h2 { margin: 0 0 1rem 0; font-size: 1rem; color: var(--accent-blue); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 0.3rem; }
        .metric { margin-bottom: 1rem; }
        .metric-label { font-size: 0.8rem; color: #888; }
        .metric-value { font-size: 1.8rem; color: #fff; font-weight: bold; }
        #comms-log { flex-grow: 1; overflow-y: auto; font-size: 0.85rem; border: 1px solid #222; padding: 0.5rem; background: #000; }
        .log-entry { border-bottom: 1px solid #111; padding: 0.3rem 0; animation: fade-in 0.3s ease-out; }
        .timestamp { color: #555; font-size: 0.75rem; margin-right: 0.8rem; }
        .source { color: var(--accent-blue); font-weight: bold; margin-right: 0.5rem; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
    <h1>KOADOS v3 // COMMAND DECK</h1>
    <div class="deck-grid">
        <div class="panel">
            <h2>Core Engine Status</h2>
            <div class="metric">
                <div class="metric-label">CPU LOAD</div>
                <div id="cpu-val" class="metric-value">0.0%</div>
            </div>
            <div class="metric">
                <div class="metric-label">MEMORY UTILIZATION</div>
                <div id="mem-val" class="metric-value">0 MB</div>
            </div>
            <div class="metric">
                <div class="metric-label">UPTIME</div>
                <div id="uptime-val" class="metric-value">0s</div>
            </div>
        </div>

        <div class="panel">
            <h2>Active Fabric</h2>
            <div id="active-agents">
                <div style="color: #444;">Scanning hangar for active agents...</div>
            </div>
        </div>

        <div class="panel">
            <h2>Spine Comms (Telemetry)</h2>
            <div id="comms-log"></div>
        </div>
    </div>

    <script>
        const host = location.host;
        const commsLog = document.getElementById('comms-log');
        
        // Unified Fabric Connection
        const fabricWs = new WebSocket(`ws://${host}/ws/fabric`);
        
        fabricWs.onmessage = (e) => {
            console.log("Raw Message:", e.data);
            try {
                const data = JSON.parse(e.data);
                
                // Route message by type
                if (data.cpu_usage !== undefined) {
                    // System Stats
                    updateStats(data);
                } else if (data.message) {
                    // Telemetry Event
                    pushLog(data);
                }
            } catch (err) {
                // Raw text fallback
                pushLog({ source: "KERNEL", message: e.data });
            }
        };

        function updateStats(stats) {
            document.getElementById('cpu-val').innerText = `${stats.cpu_usage.toFixed(1)}%`;
            document.getElementById('mem-val').innerText = `${stats.memory_usage} MB`;
            document.getElementById('uptime-val').innerText = `${stats.uptime}s`;
        }

        function pushLog(entry) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="timestamp">[${time}]</span><span class="source">${entry.source || 'SYS'}</span> ${entry.message}`;
            commsLog.prepend(div);
            
            // Limit log entries
            if (commsLog.children.length > 100) {
                commsLog.removeChild(commsLog.lastChild);
            }
        }

        fabricWs.onopen = () => pushLog({ source: "GATEWAY", message: "Deck connection established. Live Fabric active." });
        fabricWs.onclose = () => pushLog({ source: "GATEWAY", message: "Deck connection lost. Reconnecting..." });
    </script>
</body>
</html>
