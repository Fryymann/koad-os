name: Auto Add to Project
on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/Fryymann/projects/2
          github-token: ${{ secrets.GITHUB_ADMIN_PAT }}
