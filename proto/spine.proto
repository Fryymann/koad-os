syntax = "proto3";

package koad.spine.v1;

import "google/protobuf/timestamp.proto";

// The Spine service is the central nervous system for KoadOS.
service SpineService {
  // --- Core Execution ---
  
  // Synchronous execution of a command (replaces kernel.Execute)
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  
  // Heartbeat for session health monitoring (replaces kernel.Heartbeat)
  rpc Heartbeat(Empty) returns (Empty);

  // --- Task Management ---
  
  // Asynchronous task dispatch
  rpc DispatchTask(DispatchTaskRequest) returns (DispatchTaskResponse);
  rpc StreamTaskStatus(StreamTaskStatusRequest) returns (stream TaskStatusUpdate);
  
  // --- System Telemetry & Monitoring ---
  
  // Unified event and telemetry stream
  rpc StreamSystemEvents(StreamSystemEventsRequest) returns (stream SystemEvent);
  rpc GetSystemState(GetSystemStateRequest) returns (GetSystemStateResponse);

  // --- Service Discovery ---
  
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  rpc RegisterService(RegisterServiceRequest) returns (RegisterServiceResponse);

  // --- Identity & Lifecycle ---
  
  rpc RegisterComponent(RegisterComponentRequest) returns (RegisterComponentResponse);
  rpc InitializeSession(InitializeSessionRequest) returns (SessionPackage);
}

// --- Common Messages ---

message Empty {}

// --- Core Execution Messages ---

message ExecuteRequest {
  string command_id = 1;
  string name = 2;
  map<string, string> args = 3;
  string identity = 4;
  string working_dir = 5;
}

message ExecuteResponse {
  string command_id = 1;
  bool success = 2;
  string output = 3;
  string error = 4;
}

// --- Agent Hydration Messages ---

message InitializeSessionRequest {
  string agent_name = 1;
  string agent_role = 2;
  string project_name = 3;
  EnvironmentType environment = 4;
}

message SessionPackage {
  string session_id = 1;
  string identity_json = 2; 
  string project_context_json = 3;
  IntelligencePackage intelligence = 4;
}

message IntelligencePackage {
  string mission_briefing = 1; 
  repeated TaskStatusUpdate active_tasks = 2;
  repeated SystemEvent recent_events = 3;
  map<string, string> metadata = 4;
}

// --- Service Discovery Messages ---

message GetServiceRequest {
  string name = 1; 
}

message GetServiceResponse {
  ServiceEntry service = 1;
}

message RegisterServiceRequest {
  ServiceEntry service = 1;
}

message RegisterServiceResponse {
  bool success = 1;
}

message ServiceEntry {
  string name = 1;
  string host = 2;
  uint32 port = 3;
  string protocol = 4; 
  EnvironmentType environment = 5;
  string status = 6; 
}

// --- Task Messages ---

message DispatchTaskRequest {
  string command = 1;
  repeated string args = 2;
  string working_dir = 3;
  EnvironmentType environment = 4; 
  map<string, string> env_vars = 5;
  string identity = 6;
}

message DispatchTaskResponse {
  string task_id = 1;
  TaskStatus status = 2;
}

message StreamTaskStatusRequest {
  string task_id = 1; 
}

message TaskStatusUpdate {
  string task_id = 1;
  TaskStatus status = 2;
  string stdout = 3;
  string stderr = 4;
  int32 exit_code = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// --- Event & Telemetry Messages ---

message SystemEvent {
  string event_id = 1;
  string source = 2; 
  EventSeverity severity = 3;
  string message = 4;
  string metadata_json = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message StreamSystemEventsRequest {
  repeated string filter_sources = 1;
}

message GetSystemStateRequest {}

message GetSystemStateResponse {
  string identity_json = 1;
  uint32 active_tasks = 2;
  string version = 3;
}

// --- Discovery Messages ---

message RegisterComponentRequest {
  string name = 1;
  ComponentType type = 2;
  EnvironmentType environment = 3;
}

message RegisterComponentResponse {
  string session_id = 1;
  bool authorized = 2;
}

// --- Enums ---

enum EnvironmentType {
  ENVIRONMENT_TYPE_UNSPECIFIED = 0;
  ENVIRONMENT_TYPE_WSL = 1;
  ENVIRONMENT_TYPE_WINDOWS = 2;
  ENVIRONMENT_TYPE_REMOTE = 3;
}

enum TaskStatus {
  TASK_STATUS_PENDING = 0;
  TASK_STATUS_RUNNING = 1;
  TASK_STATUS_SUCCESS = 2;
  TASK_STATUS_FAILED = 3;
  TASK_STATUS_CANCELLED = 4;
}

enum EventSeverity {
  EVENT_SEVERITY_DEBUG = 0;
  EVENT_SEVERITY_INFO = 1;
  EVENT_SEVERITY_WARN = 2;
  EVENT_SEVERITY_ERROR = 3;
  EVENT_SEVERITY_CRITICAL = 4;
}

enum ComponentType {
  COMPONENT_TYPE_CLI = 0;
  COMPONENT_TYPE_TUI = 1;
  COMPONENT_TYPE_DASHBOARD = 2;
  COMPONENT_TYPE_SKILL = 3;
  COMPONENT_TYPE_AGENT = 4;
}
