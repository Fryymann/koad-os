syntax = "proto3";
package koad.kernel;

service KernelService {
    // Execute a command from the CLI or an Agent
    rpc Execute(CommandRequest) returns (CommandResponse);
    
    // Stream system telemetry and logs to the TUI
    rpc StreamTelemetry(Empty) returns (stream TelemetryUpdate);
    
    // Heartbeat for session health monitoring
    rpc Heartbeat(Empty) returns (Empty);
}

message CommandRequest {
    string command_id = 1;
    string name = 2;
    map<string, string> args = 3;
    string identity = 4;
}

message CommandResponse {
    string command_id = 1;
    bool success = 2;
    string output = 3;
    string error = 4;
}

message TelemetryUpdate {
    string source = 1;
    string message = 2;
    int64 timestamp = 3;
    LogLevel level = 4;
}

enum LogLevel {
    INFO = 0;
    WARN = 1;
    ERROR = 2;
    DEBUG = 3;
}

message Empty {}
